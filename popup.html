<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>CiteContext</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
            width: 320px;
            padding: 16px;
            margin: 0;
            color: #333;
        }

        header {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
            border-bottom: 1px solid #eee;
            padding-bottom: 12px;
        }

        .logo {
            width: 36px;
            height: 36px;
            margin-right: 12px;
        }

        h1 {
            font-size: 18px;
            margin: 0;
            font-weight: 500;
        }

        .app-version {
            color: #888;
            font-size: 12px;
            margin-left: 8px;
        }

        .status {
            background: #f5f5f5;
            border-radius: 4px;
            padding: 12px;
            margin-bottom: 16px;
            font-size: 14px;
        }

        .status.active {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .status.inactive {
            background: #ffebee;
            color: #c62828;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
        }

        .toggle-label {
            flex-grow: 1;
            font-size: 14px;
        }

        /* Toggle Switch Styles */
        .switch {
            position: relative;
            display: inline-block;
            width: 38px;
            height: 20px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .3s;
            border-radius: 20px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: #2196F3;
        }

        input:focus+.slider {
            box-shadow: 0 0 1px #2196F3;
        }

        input:checked+.slider:before {
            transform: translateX(18px);
        }

        .settings-section {
            margin-top: 16px;
            font-size: 14px;
        }

        .settings-heading {
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }

        select,
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 8px;
            margin-bottom: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }

        button {
            background-color: #2196F3;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #0d8bf2;
        }

        .footer {
            margin-top: 16px;
            font-size: 12px;
            color: #888;
            text-align: center;
        }

        .footer a {
            color: #2196F3;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .stats {
            margin-top: 16px;
            font-size: 12px;
            color: #666;
        }

        .api-key-container {
            position: relative;
        }

        .toggle-visibility {
            position: absolute;
            right: 8px;
            top: 8px;
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            padding: 0;
            font-size: 12px;
        }

        .error-message {
            color: #c62828;
            font-size: 12px;
            margin-top: -8px;
            margin-bottom: 8px;
            display: none;
        }

        .apikey-hint {
            font-size: 12px;
            color: #666;
            margin-top: -8px;
            margin-bottom: 12px;
        }
    </style>
</head>

<body>
    <header>
        <div class="logo">📑</div> <!-- Placeholder logo -->
        <h1>CiteContext <span class="app-version">v1.0</span></h1>
    </header>

    <div id="status" class="status active">
        CiteContext is active on this page
    </div>

    <div class="toggle-container">
        <div class="toggle-label">Enable CiteContext</div>
        <label class="switch">
            <input type="checkbox" id="activation-toggle" checked>
            <span class="slider"></span>
        </label>
    </div>

    <div class="settings-section">
        <div class="settings-heading">OpenAI API Key</div>
        <div class="api-key-container">
            <input type="password" id="api-key" placeholder="Enter your OpenAI API key">
            <button class="toggle-visibility" id="toggle-key-visibility">Show</button>
        </div>
        <div class="apikey-hint">Your API key is stored locally and only used for citation processing</div>
        <div id="api-key-error" class="error-message">Please enter a valid API key</div>

        <div class="settings-heading">Model Settings</div>
        <select id="model-selection">
            <option value="gpt-3.5-turbo">Standard (GPT-3.5 Turbo)</option>
            <option value="gpt-4o">High Quality (GPT-4o)</option>
        </select>

        <button id="save-settings">Save Settings</button>
    </div>

    <div class="stats">
        <div>Citations processed: <span id="citations-count">0</span></div>
        <div>Cache size: <span id="cache-size">0</span> items</div>
    </div>

    <div class="footer">
        <p>Made with ❤️ by <a href="#" target="_blank">CiteContext Team</a></p>
    </div>

    <script src="popup.js"></script>
</body>

</html>
